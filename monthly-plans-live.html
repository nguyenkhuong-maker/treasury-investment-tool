<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Treasury Monthly Plans</title>
  <style>
    :root {
      --navy:#0b1f4b;
      --navy-2:#1e3a8a;
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --ok:#15803d;
      --warn:#a16207;
      --soft-blue:#eff6ff;
      --soft-gold:#fff7e6;
      --soft-green:#ecfdf5;
      --soft-slate:#f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 180px);
      color: var(--text);
    }
    .wrap { max-width: 1480px; margin: 0 auto; padding: 22px; }
    .hero {
      background: linear-gradient(135deg, var(--navy), var(--navy-2));
      color: #fff;
      border-radius: 20px;
      padding: 20px 22px;
      box-shadow: 0 18px 60px rgba(15,23,42,.14);
    }
    .hero h1 { margin: 0; font-size: 26px; }
    .hero p { margin: 8px 0 0; color: rgba(255,255,255,.88); line-height: 1.6; }
    .toolbar {
      margin-top: 18px; display: grid; grid-template-columns: 280px 1fr; gap: 14px;
      background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px;
      box-shadow: 0 8px 24px rgba(15,23,42,.04);
    }
    .field label { display:block; margin-bottom:8px; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    select {
      width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:#fff; font:inherit;
    }
    .toolbar-note {
      display:flex; align-items:center; padding:12px 14px; border-radius:12px; background:#f8fafc; border:1px solid #e2e8f0; color:var(--muted); line-height:1.6; font-size:13px;
    }
    .plans {
      margin-top: 18px; display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; align-items:start;
    }
    .plan-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 20px; overflow: hidden;
      box-shadow: 0 12px 28px rgba(15,23,42,.06);
    }
    .plan-head { padding: 18px; border-bottom: 1px solid var(--line); }
    .plan-title-row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .plan-title { margin:0; font-size:22px; color:var(--navy); }
    .plan-meta { margin-top: 6px; font-size:13px; color:var(--muted); }
    .badges, .actions { display:flex; flex-wrap:wrap; gap:8px; }
    .badges { margin-top:10px; }
    .badge { display:inline-flex; align-items:center; padding:7px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .badge.blue { background:var(--soft-blue); color:#1d4ed8; }
    .badge.gold { background:var(--soft-gold); color:var(--warn); }
    .badge.green { background:var(--soft-green); color:var(--ok); }
    .badge.gray { background:#f1f5f9; color:#475569; }
    .highlights { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-top:14px; }
    .highlight { background:#f8fafc; border:1px solid var(--line); border-radius:14px; padding:12px; }
    .highlight .label { font-size:12px; color:var(--muted); }
    .highlight .value { margin-top:6px; font-weight:800; }
    .head-actions { margin-top: 14px; }
    .section { padding:18px; border-top:1px solid var(--line); background:linear-gradient(180deg,#fff,#fafcff); }
    .section h3 { margin:0 0 12px; font-size:18px; color:var(--navy); }
    .section.compact { padding-top: 14px; padding-bottom: 14px; }
    .iframe-wrap { background:#f8fafc; padding:14px; }
    iframe { width:100%; min-height:920px; border:1px solid var(--line); border-radius:14px; background:#fff; }
    .timeline { display:grid; gap:10px; }
    .timeline-item {
      border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#fff;
      display:grid; grid-template-columns:170px 1fr; gap:12px;
    }
    .timeline-time { font-size:12px; color:var(--muted); }
    .timeline-body { font-size:14px; line-height:1.55; }
    .btn, button.btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px; text-decoration:none;
      padding:11px 14px; border-radius:12px; border:1px solid var(--line); background:#fff; color:var(--navy); font-weight:700; cursor:pointer; font:inherit;
    }
    .btn.primary, button.btn.primary {
      background: var(--navy); color:#fff; border-color: var(--navy);
    }
    .btn.print, button.btn.print {
      background: #fff; color: var(--navy);
    }
    .helper-note { margin-top: 10px; font-size: 12px; color: var(--muted); }
    @media (max-width: 1180px) {
      .toolbar, .plans, .highlights { grid-template-columns: 1fr; }
      .timeline-item { grid-template-columns:1fr; }
    }
    @media (max-width: 768px) {
      .wrap { padding:14px; }
      .hero h1 { font-size:22px; }
      .plan-title-row { flex-direction:column; }
      iframe { min-height:760px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero" id="heroBlock">
      <h1>Kế hoạch ngân quỹ theo tháng</h1>
      <p>Xem kế hoạch ngân quỹ VIHALI và CÁ NHÂN theo từng tháng, ưu tiên thao tác gọn để đọc nhanh, in báo cáo và trình CFO khi cần.</p>
    </section>

    <section class="toolbar">
      <div class="field">
        <label>Tháng kế hoạch</label>
        <select id="monthSelect"></select>
      </div>
      <div class="toolbar-note" id="toolbarNote"></div>
    </section>

    <section class="plans" id="plans"></section>
  </div>

  <script src="./data/monthly-plans/live-index.js?v=20260423-1730"></script>
  <script>
    const DB = window.MONTHLY_PLANS_LIVE_DATA;
    const monthSelect = document.getElementById('monthSelect');
    const toolbarNote = document.getElementById('toolbarNote');
    const plansEl = document.getElementById('plans');
    const heroBlock = document.getElementById('heroBlock');
    const CFO_APPROVAL_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyMyXnoXOj4PJ7f5w4fPaXzbt4DpsRfA6mxIWEFV3LeYCKUO0aWle-W20CZxzEjvMhWyA/exec';
    const REVIEW_TEST_EMAIL = DB.meta.reviewTestEmail || 'kdhn1911@gmail.com';

    if (window.self !== window.top) {
      heroBlock.style.display = 'none';
      document.body.style.background = '#f8fafc';
      document.querySelector('.wrap').style.paddingTop = '14px';
    }

    function buildOptions() {
      DB.availableMonths.forEach((item) => {
        const option = document.createElement('option');
        option.value = item.key;
        option.textContent = `${item.label} · ${item.periodLabel}`;
        if (item.key === DB.meta.defaultMonth) option.selected = true;
        monthSelect.appendChild(option);
      });
    }

    function badge(text, kind) {
      return `<span class="badge ${kind}">${text}</span>`;
    }

    function statusMeta(plan) {
      if (plan.status === 'approved') return { label: 'Đã duyệt CFO', cls: 'green' };
      if (plan.status === 'ready_for_cfo') return { label: 'Sẵn sàng trình CFO', cls: 'gold' };
      return { label: 'Bản kế hoạch', cls: 'gray' };
    }

    function timelineItems(plan) {
      return (plan.timeline || []).filter((item) => ['cfo_reviewed', 'approved', 'published'].includes(item.type));
    }

    function renderTimeline(plan) {
      const items = timelineItems(plan);
      if (!items.length) return '';
      return `
        <div class="section">
          <h3>🕒 Timeline</h3>
          <div class="timeline">${items.map((item) => `
            <div class="timeline-item">
              <div class="timeline-time">${item.at}<br/><span>${item.label}</span></div>
              <div class="timeline-body">${item.note}</div>
            </div>
          `).join('')}</div>
        </div>
      `;
    }

    function printPlanReport(plan) {
      const printWindow = window.open(plan.sourceHtml, '_blank');
      if (!printWindow) {
        alert('Trình duyệt đang chặn popup. Anh cho phép mở tab mới rồi thử lại giúp em nhé.');
        return;
      }
      printWindow.addEventListener('load', () => {
        setTimeout(() => printWindow.print(), 300);
      }, { once: true });
    }

    async function sendPlanToCfo(monthKey, plan) {
      const payload = {
        planId: plan.id,
        month: monthKey,
        planType: plan.type,
        title: plan.title,
        version: plan.version,
        contentHash: `${plan.id}:${plan.version}`,
        planUrl: new URL(plan.sourceHtml.replace(/^\.\//, ''), window.location.href).href
      };

      try {
        await fetch(CFO_APPROVAL_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        alert(`Đã gửi yêu cầu trình CFO cho ${plan.title}. Anh kiểm tra inbox ${REVIEW_TEST_EMAIL} giúp em nhé.`);
      } catch (error) {
        console.error(error);
        alert('Không gọi được Apps Script Web App. Anh thử lại giúp em nhé.');
      }
    }

    function renderPlan(plan, monthKey, month) {
      const status = statusMeta(plan);
      return `
        <article class="plan-card">
          <div class="plan-head">
            <div class="plan-title-row">
              <div>
                <h2 class="plan-title">${plan.type === 'company' ? '🏢' : '👤'} ${plan.title}</h2>
                <div class="plan-meta">${month.monthLabel} · ${month.periodLabel}</div>
                <div class="badges">
                  ${badge('Version ' + plan.version, 'gray')}
                  ${badge(status.label, status.cls)}
                </div>
              </div>
            </div>
            <div class="highlights">
              ${plan.highlights.map((item) => `
                <div class="highlight">
                  <div class="label">${item.label}</div>
                  <div class="value">${item.value}</div>
                </div>
              `).join('')}
            </div>
            ${plan.allowSendToCfo ? `
              <div class="head-actions actions">
                <button class="btn primary" data-action="send-cfo" data-plan-id="${plan.id}">📨 Gửi CFO</button>
              </div>
              <div class="helper-note">Mail test hiện tại: ${REVIEW_TEST_EMAIL}</div>
            ` : ''}
          </div>

          <div class="iframe-wrap">
            <iframe src="${plan.sourceHtml}" title="${plan.title}"></iframe>
          </div>

          ${renderTimeline(plan)}

          <div class="section compact">
            <h3>📄 Tài liệu liên quan</h3>
            <div class="actions">
              <a class="btn" href="${plan.sourcePdf}" target="_blank" rel="noreferrer">Mở bản PDF</a>
              <button class="btn print" data-action="print-report" data-plan-id="${plan.id}">In báo cáo</button>
            </div>
          </div>
        </article>
      `;
    }

    function currentMonth() {
      return DB.months[monthSelect.value];
    }

    function currentPlans() {
      const month = currentMonth();
      return [month.company, month.personal];
    }

    function bindActions() {
      const monthKey = monthSelect.value;
      const planMap = new Map(currentPlans().map((plan) => [plan.id, plan]));

      document.querySelectorAll('[data-action="print-report"]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const plan = planMap.get(btn.dataset.planId);
          if (plan) printPlanReport(plan);
        });
      });

      document.querySelectorAll('[data-action="send-cfo"]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const plan = planMap.get(btn.dataset.planId);
          if (plan) await sendPlanToCfo(monthKey, plan);
        });
      });
    }

    function render() {
      const monthKey = monthSelect.value;
      const month = DB.months[monthKey];
      toolbarNote.innerHTML = `<strong>${month.monthLabel}</strong> · ${month.periodLabel}<br/>${DB.meta.note}`;
      plansEl.innerHTML = [month.company, month.personal].map((plan) => renderPlan(plan, monthKey, month)).join('');
      bindActions();
    }

    monthSelect.addEventListener('change', render);
    buildOptions();
    render();
  </script>
</body>
</html>
